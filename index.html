<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAP-IN | Pro Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Mode Variables (Default) */
            --bg: #0b0e14;
            --panel: #161b22;
            --text: #ffffff;
            --text-dim: #8b949e;
            --primary: #58a6ff;
            --accent: #1f6feb;
            --border: rgba(255, 255, 255, 0.1);
            --success: #3fb950;
        }

        [data-theme="light"] {
            /* Light Mode Variables */
            --bg: #f6f8fa;
            --panel: #ffffff;
            --text: #1f2328;
            --text-dim: #656d76;
            --primary: #0969da;
            --accent: #54aeff;
            --border: rgba(0, 0, 0, 0.1);
            --success: #1a7f37;
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body {
            margin: 0; font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text); overflow-x: hidden;
        }

        /* --- THEME TOGGLE --- */
        .theme-toggle {
            position: fixed; bottom: 20px; right: 20px;
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--primary); color: white;
            border: none; cursor: pointer; z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        }

        /* --- LOGIN --- */
        #login-screen {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px; background: linear-gradient(135deg, var(--bg), var(--accent));
        }

        .login-box {
            background: var(--panel); padding: 40px; border-radius: 24px;
            border: 1px solid var(--border); width: 100%; max-width: 380px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.6s ease;
        }

        input, select {
            width: 100%; padding: 14px; margin: 10px 0;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font-size: 16px;
        }

        /* --- DASHBOARD --- */
        #dashboard { display: none; padding-bottom: 50px; }

        .nav-bar {
            display: flex; gap: 10px; padding: 15px 20px;
            overflow-x: auto; position: sticky; top: 0;
            background: var(--panel); border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .nav-link {
            padding: 8px 18px; border-radius: 50px; cursor: pointer;
            white-space: nowrap; font-weight: 600; font-size: 0.9rem;
            border: 1px solid var(--border);
        }

        .nav-link.active { background: var(--primary); color: white; border-color: var(--primary); }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .stat-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }

        .stat-card {
            background: var(--panel); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border);
        }

        .table-container {
            background: var(--panel); border-radius: 16px;
            overflow-x: auto; border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }

        .status-pill {
            padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 800;
        }
        .online { background: rgba(63, 185, 80, 0.15); color: var(--success); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section { display: none; animation: slideUp 0.4s ease forwards; }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin: 0 0 5px 0">TAP-IN</h2>
            <p style="color: var(--text-dim); margin-bottom: 25px">Admin Portal Access</p>
            <input type="text" id="userInput" placeholder="Username">
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="login()" style="width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:800; cursor:pointer;">SIGN IN</button>
            <p id="errMsg" style="color:red; font-size:0.8rem; margin-top:15px"></p>
        </div>
    </div>

    <div id="dashboard">
        <div class="nav-bar">
            <div class="nav-link active" onclick="showTab('live', this)">Live</div>
            <div class="nav-link" onclick="showTab('history', this)">History Logs</div>
            <div class="nav-link" onclick="showTab('summary', this)">Summary</div>
            <div class="nav-link" style="color: var(--text-dim)" onclick="location.reload()">Logout</div>
        </div>

        <div class="container">
            <div id="live" class="section" style="display: block;">
                <h1>Current Status</h1>
                <div class="stat-grid">
                    <div class="stat-card"><h3>Timed In</h3><p style="color:var(--success)">82</p></div>
                    <div class="stat-card"><h3>Timed Out</h3><p>14</p></div>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Name</th><th>Time In</th><th>Status</th></tr></thead>
                        <tbody>
                            <tr><td>Edison Tan</td><td>07:45 AM</td><td><span class="status-pill online">Active</span></td></tr>
                            <tr><td>Juan Dela Cruz</td><td>08:10 AM</td><td><span class="status-pill online">Active</span></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="history" class="section">
                <h1>Attendance History</h1>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <select id="monthFilter" onchange="filterHistory()" style="flex: 1">
                        <option value="all">All Months (Feb-Mar)</option>
                        <option value="March">March 2026</option>
                        <option value="February">February 2026</option>
                    </select>
                    <input type="text" id="search" onkeyup="filterHistory()" placeholder="Search Name..." style="flex: 2">
                </div>
                <div class="table-container">
                    <table id="histTable">
                        <thead><tr><th>Month</th><th>Name</th><th>Date</th><th>Log</th></tr></thead>
                        <tbody id="histBody">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="summary" class="section">
                <h1>Report Overview</h1>
                <div class="stat-card">
                    <h3>Peak Arrival Time</h3>
                    <p>07:30 AM - 08:00 AM</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const historyData = [
            { m: "March", d: "Mar 09", n: "Maria Clara", l: "In: 07:30 | Out: 04:30" },
            { m: "March", d: "Mar 05", n: "Pedro Penduko", l: "In: 08:00 | Out: 05:00" },
            { m: "February", d: "Feb 28", n: "Antonio Luna", l: "In: 07:15 | Out: 03:45" },
            { m: "February", d: "Feb 15", n: "Melchora Aquino", l: "In: 08:30 | Out: 05:30" }
        ];

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeBtn');
            if (html.getAttribute('data-theme') === 'dark') {
                html.setAttribute('data-theme', 'light');
                btn.innerText = '☀️';
            } else {
                html.setAttribute('data-theme', 'dark');
                btn.innerText = '🌙';
            }
        }

        function login() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(u === "Edison Tan" && p === "Pass123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadHistory();
            } else {
                document.getElementById('errMsg').innerText = "Wrong credentials. Try Edison Tan / Pass123";
            }
        }

        function showTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active');
        }

        function loadHistory() {
            const body = document.getElementById('histBody');
            body.innerHTML = historyData.map(h => `
                <tr data-month="${h.m}">
                    <td style="font-weight:bold; color:var(--primary)">${h.m}</td>
                    <td>${h.n}</td>
                    <td>${h.d}</td>
                    <td>${h.l}</td>
                </tr>
            `).join('');
        }

        function filterHistory() {
            const month = document.getElementById('monthFilter').value;
            const search = document.getElementById('search').value.toLowerCase();
            const rows = document.querySelectorAll('#histBody tr');

            rows.forEach(row => {
                const name = row.children[1].innerText.toLowerCase();
                const rowMonth = row.getAttribute('data-month');
                const monthMatch = (month === 'all' || rowMonth === month);
                const searchMatch = name.includes(search);
                row.style.display = (monthMatch && searchMatch) ? "" : "none";
            });
        }
    </script>
</body>
</html>
